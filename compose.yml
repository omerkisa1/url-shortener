services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:${POSTGRES_PASSWORD}@db:5432/url_shortener
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api

  db:
    image: postgres:15                  
    container_name: local_pg            
    restart: always     
    env_file:
    - .env                
    environment:                        
      POSTGRES_USER: user
      POSTGRES_DB: url_shortener
    ports:
      - "5432"                     
    volumes:
      - pgdata:/var/lib/postgresql/data 

  redis:
    image: redis:7-alpine
    ports:
        - "6379:6379"
      
  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASSWORD: guest

  nginx:
      image: nginx:alpine
      ports:
        - "80:80"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      depends_on:
        - api
        - frontend


volumes:
  pgdata:                               
