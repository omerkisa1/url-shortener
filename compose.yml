services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15                  
    container_name: local_pg            
    restart: always     
    env_file:
    - .env                
    environment:                        
      POSTGRES_USER: user
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"                     
    volumes:
      - pgdata:/var/lib/postgresql/data 

volumes:
  pgdata:                               
