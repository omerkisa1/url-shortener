services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:${POSTGRES_PASSWORD}@db:5432/url_shortener
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15                  
    container_name: local_pg            
    restart: always     
    env_file:
    - .env                
    environment:                        
      POSTGRES_USER: user
      POSTGRES_DB: url_shortener
    ports:
      - "5432"                     
    volumes:
      - pgdata:/var/lib/postgresql/data 

  redis:
    image: redis:7.4-alpine
    ports:
        - "6379:6379"


volumes:
  pgdata:                               
